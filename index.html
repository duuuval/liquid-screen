<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0a0f" />
<title>Liquid Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: #fff;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Background is now drawn onto the canvas (behind the drops) so we can
     sample it for the refraction effect inside each droplet. */
  html, body { background: #060811; }

  canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: block;
  }

  /* HUD — minimal, measurement-instrument feel.
     Top-right, slightly offset, low-contrast so droplets reading over it feels natural. */
  #hud {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 18px);
    right: 22px;
    z-index: 2;
    font-weight: 200;
    font-size: 28px;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  #hud .unit {
    font-size: 14px;
    font-weight: 300;
    opacity: 0.65;
    letter-spacing: 0.08em;
  }

  /* Overlays — start screen and game over screen share structure */
  .overlay {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
    background: rgba(8, 8, 16, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    text-align: center;
    transition: opacity 0.35s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title {
    font-weight: 200;
    font-size: 38px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
  }
  .title .accent {
    color: #7ec9ff;
    font-weight: 300;
  }
  .subtitle {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    max-width: 280px;
    line-height: 1.7;
  }

  .btn {
    font-family: inherit;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 16px 32px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.7);
    transform: scale(0.98);
  }

  /* Debug overlay — tap the dot in the bottom-left to toggle */
  #debugDot {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    left: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    z-index: 3;
    cursor: pointer;
  }
  #debugDot.active { background: rgba(126, 201, 255, 0.6); border-color: #7ec9ff; }
  #debug {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 50px);
    left: 12px;
    z-index: 3;
    font-size: 10px;
    line-height: 1.5;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.55);
    padding: 10px 12px;
    border-radius: 4px;
    pointer-events: none;
    letter-spacing: 0.02em;
    max-width: 200px;
    font-variant-numeric: tabular-nums;
    display: none;
  }
  #debug.on { display: block; }
  #debug .k { color: rgba(255,255,255,0.45); }
  #debug .ok { color: #8fe28f; }
  #debug .bad { color: #ff9488; }

  .final-score {
    font-weight: 200;
    font-size: 64px;
    letter-spacing: 0.02em;
    color: #7ec9ff;
    font-variant-numeric: tabular-nums;
  }
  .final-score .unit {
    font-size: 22px;
    opacity: 0.6;
    margin-left: 6px;
  }
  .label {
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .err {
    color: #ff9488;
    font-size: 12px;
    letter-spacing: 0.1em;
    max-width: 280px;
    line-height: 1.6;
    margin-top: -12px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud"><span id="score">50.0</span><span class="unit">µL</span></div>

<!-- Debug overlay (tap dot to toggle) -->
<div id="debugDot"></div>
<div id="debug"></div>

<!-- Start / calibrate screen -->
<div id="start" class="overlay">
  <div class="title">Liquid<span class="accent"> Screen</span></div>
  <div class="subtitle">Tilt your phone to roll the droplet.<br>Absorb others to grow.<br>Don't slide off.</div>
  <button id="startBtn" class="btn">Tap to Calibrate</button>
  <div id="err" class="err" style="display:none"></div>
</div>

<!-- Game over screen -->
<div id="over" class="overlay hidden">
  <div class="label">Final Volume</div>
  <div class="final-score"><span id="finalScore">50.0</span><span class="unit">µL</span></div>
  <button id="replayBtn" class="btn">Replay</button>
</div>

<script>
(() => {
  'use strict';

  // ========================================================================
  // SETUP & CONSTANTS
  // ========================================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: true });

  const DPR = Math.min(window.devicePixelRatio || 1, 2); // cap at 2 for perf on high-dpi phones
  let W = 0, H = 0;  // CSS pixels (logical)

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ---- Tunables (gameplay feel lives here — all the knobs in one place)
  const TUNE = {
    // Physics
    baseAccel: 1200,         // px/s^2 at full tilt, at starting mass
    massAccelExp: 0.45,      // how much bigger = slower to accelerate. 0 = no effect, 1 = linear. 0.45 feels "heavy but not stuck"
    friction: 0.985,         // per-frame velocity multiplier at 60fps (tiny amount of drag so full-release slows eventually)
    tiltMaxDeg: 35,          // beyond this tilt, you're already at max accel — don't require wrist-breaking angles
    tiltDeadzone: 1.5,       // degrees — ignore tiny jitter when phone is "flat"
    // Starting state
    startVolume: 50.0,       // µL
    minVolume: 5,            // target drop min volume
    maxVolume: 15,           // target drop max volume
    targetCount: 10,         // on-screen static drops
    // Visuals
    radiusPerUL: 1.25,       // px per µL — r = radiusPerUL * cbrt(volume) * tuningConstant — actually, we use area scaling (see deriveRadius)
    stretchMax: 0.28,        // max ellipse stretch factor at high speed (0.28 = 28% elongation)
    stretchVelRef: 900,      // velocity (px/s) at which stretch approaches max
    // Score animation
    scoreLerpHz: 6,          // how fast the displayed score chases true score (higher = faster)
  };

  // Physical radius from volume. Treating the droplet top-down as a circle,
  // volume µL ~ proportional to area (rough but reads correctly on screen).
  // r = k * sqrt(volume). Tuned so 50µL -> ~38px radius, 200µL -> ~76px.
  function deriveRadius(volume) {
    return 5.4 * Math.sqrt(volume);
  }

  // ========================================================================
  // STATE
  // ========================================================================
  const STATE = {
    READY: 'ready',     // showing calibrate screen
    PLAYING: 'playing',
    OVER: 'over',
  };
  let state = STATE.READY;

  // Orientation — raw from device
  let rawBeta = 0;    // front-back tilt (x axis)  -180..180
  let rawGamma = 0;   // left-right tilt (y axis)  -90..90
  let haveOrientation = false;
  let orientationEventCount = 0;   // for debug
  let lastOrientationT = 0;        // for debug — detect stalled events

  // Calibrated zero — set on tap
  let calBeta = 0;
  let calGamma = 0;

  // Shape-noise amplitudes (fraction of radius).
  const PLAYER_SHAPE_AMP = 0.09;   // ~9% perturbation — lumpy but still clearly "me"
  const TARGET_SHAPE_AMP = 0.14;   // ~14% — more varied, reads as real beads

  // Player droplet
  const player = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    volume: TUNE.startVolume,
    r: deriveRadius(TUNE.startVolume),
    sig: null,   // populated below once makeShapeSig is defined — see init
  };

  // Static target drops
  const targets = []; // { x, y, volume, r, spawnT, sig }

  // Score
  let displayedScore = TUNE.startVolume;  // what's shown, chases trueScore
  let trueScore = TUNE.startVolume;

  // Time
  let lastT = performance.now();

  // ========================================================================
  // SPAWNING
  // ========================================================================
  function randomTargetVolume() {
    return TUNE.minVolume + Math.random() * (TUNE.maxVolume - TUNE.minVolume);
  }

  function spawnTarget(avoidPlayer = true) {
    const margin = 40;
    let x, y, tries = 0;
    const vol = randomTargetVolume();
    const r = deriveRadius(vol);
    do {
      x = margin + Math.random() * (W - 2 * margin);
      y = margin + Math.random() * (H - 2 * margin);
      tries++;
      if (tries > 20) break;
    } while (
      avoidPlayer &&
      Math.hypot(x - player.x, y - player.y) < player.r + r + 60
    );
    targets.push({
      x, y, volume: vol, r,
      spawnT: performance.now(),       // for splat-in animation
      sig: makeShapeSig(TARGET_SHAPE_AMP),
    });
  }

  function resetGame() {
    player.x = W / 2;
    player.y = H / 2;
    player.vx = 0;
    player.vy = 0;
    player.volume = TUNE.startVolume;
    player.r = deriveRadius(player.volume);
    player.sig = makeShapeSig(PLAYER_SHAPE_AMP);
    targets.length = 0;
    trueScore = TUNE.startVolume;
    displayedScore = TUNE.startVolume;
    updateScoreHUD(true);
    for (let i = 0; i < TUNE.targetCount; i++) spawnTarget(true);
  }

  // ========================================================================
  // ORIENTATION / PERMISSIONS
  // ========================================================================
  function onOrientation(e) {
    if (e.beta == null || e.gamma == null) return;
    rawBeta = e.beta;
    rawGamma = e.gamma;
    haveOrientation = true;
    orientationEventCount++;
    lastOrientationT = performance.now();
  }

  async function requestOrientationPermission() {
    // iOS 13+ requires explicit permission via user gesture
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res !== 'granted') {
          showErr('Motion access denied. Enable in Settings → Safari → Motion & Orientation.');
          return false;
        }
      } catch (err) {
        showErr('Could not request motion access. Try reloading.');
        return false;
      }
    }
    window.addEventListener('deviceorientation', onOrientation, true);
    return true;
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ========================================================================
  // INPUT → ACCEL
  // ========================================================================
  function currentTilt() {
    // gamma = left-right (controls X), beta = front-back (controls Y)
    let gx = rawGamma - calGamma;
    let gy = rawBeta - calBeta;

    // deadzone
    if (Math.abs(gx) < TUNE.tiltDeadzone) gx = 0;
    if (Math.abs(gy) < TUNE.tiltDeadzone) gy = 0;

    // clamp to tiltMaxDeg so everything past that is just "max tilt"
    const max = TUNE.tiltMaxDeg;
    gx = Math.max(-max, Math.min(max, gx));
    gy = Math.max(-max, Math.min(max, gy));

    // normalize to -1..1
    return { nx: gx / max, ny: gy / max };
  }

  // ========================================================================
  // UPDATE
  // ========================================================================
  function update(dt) {
    if (state !== STATE.PLAYING) return;

    const { nx, ny } = currentTilt();

    // Mass-scaled acceleration. Bigger droplets accelerate slower.
    const massRatio = player.volume / TUNE.startVolume;
    const accelScale = Math.pow(massRatio, -TUNE.massAccelExp);
    const ax = nx * TUNE.baseAccel * accelScale;
    const ay = ny * TUNE.baseAccel * accelScale;

    player.vx += ax * dt;
    player.vy += ay * dt;

    // Friction (frame-rate independent approximation)
    const fricFactor = Math.pow(TUNE.friction, dt * 60);
    player.vx *= fricFactor;
    player.vy *= fricFactor;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Game over — entire drop off screen (soccer-line rule)
    if (player.x + player.r < 0 ||
        player.x - player.r > W ||
        player.y + player.r < 0 ||
        player.y - player.r > H) {
      triggerGameOver();
      return;
    }

    // Collisions with targets
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      const dx = t.x - player.x;
      const dy = t.y - player.y;
      const d = Math.hypot(dx, dy);
      // Absorb when the player's leading edge overlaps the target center-ish.
      // Using r + r*0.5 feels like "the target gets sucked in" rather than merely grazed.
      if (d < player.r + t.r * 0.35) {
        player.volume += t.volume;
        player.r = deriveRadius(player.volume);
        trueScore = player.volume;
        targets.splice(i, 1);
        spawnTarget(true);
      }
    }

    // Score display lerp
    const lerpK = 1 - Math.exp(-TUNE.scoreLerpHz * dt);
    displayedScore += (trueScore - displayedScore) * lerpK;
    updateScoreHUD();
  }

  const scoreEl = document.getElementById('score');
  function updateScoreHUD(force) {
    scoreEl.textContent = displayedScore.toFixed(1);
  }

  // ========================================================================
  // RENDER
  // ========================================================================
  //
  // Model: drops are DARK LENSES on a live animated background, with bright
  // rim arcs on the upper edge (ambient top-light grazing the curve) and a
  // small randomized pinpoint specular. Each drop refracts the background
  // by sampling it, magnified and offset, clipped to the drop's shape.
  //
  // Layers per drop (bottom to top):
  //   1. Soft shadow underneath (drop sits in a wet-ring halo)
  //   2. Refraction: magnified/offset background sample, clipped to shape
  //   3. Body tint: darkens toward rim, plus inner lower-shadow for dome feel
  //   4. Bright rim arc on upper edge (linear-gradient-masked stroke)
  //   5. Tiny pinpoint specular at a per-drop randomized position

  // ---------- Animated background ----------
  // Drawn live every frame to a dedicated offscreen canvas, which the drops
  // then sample for refraction. Drawing to offscreen first (instead of the
  // main canvas directly) lets us blit it once as the main background AND
  // sample it per drop without re-generating gradients each time.
  const bgCanvas = document.createElement('canvas');
  const bgCtx = bgCanvas.getContext('2d');
  // Render background at 0.6x resolution — imperceptible on a phone display,
  // saves significant fill time when we have 10+ drops sampling it.
  const BG_RES = 0.6;

  function resizeBg() {
    bgCanvas.width = Math.floor(W * BG_RES * DPR);
    bgCanvas.height = Math.floor(H * BG_RES * DPR);
  }
  resizeBg();
  window.addEventListener('resize', () => setTimeout(resizeBg, 50));

  // Four slow-drifting colored blobs. Hues chosen to feel like phone-screen
  // wallpaper reflections — blues, violets, a touch of teal.
  const bgBlobs = [
    { hue: 215, sat: 60, lig: 34, bx: 0.22, by: 0.18, ax: 0.10, ay: 0.07, sp: 0.05, ph: 0.0 },
    { hue: 268, sat: 50, lig: 28, bx: 0.78, by: 0.30, ax: 0.12, ay: 0.09, sp: 0.06, ph: 1.7 },
    { hue: 195, sat: 65, lig: 32, bx: 0.50, by: 0.82, ax: 0.14, ay: 0.07, sp: 0.04, ph: 3.1 },
    { hue: 290, sat: 45, lig: 24, bx: 0.15, by: 0.92, ax: 0.09, ay: 0.06, sp: 0.07, ph: 4.4 },
  ];

  function renderBackground(tSec) {
    const bw = bgCanvas.width;
    const bh = bgCanvas.height;

    // Inky base. The reference image has this deep near-black depth.
    bgCtx.fillStyle = '#050810';
    bgCtx.fillRect(0, 0, bw, bh);

    // Additive blending on the blobs so overlaps build into brighter zones.
    bgCtx.globalCompositeOperation = 'lighter';
    for (const b of bgBlobs) {
      const t = tSec * b.sp + b.ph;
      const cx = (b.bx + Math.sin(t) * b.ax) * bw;
      const cy = (b.by + Math.cos(t * 0.8) * b.ay) * bh;
      const r = Math.max(bw, bh) * 0.55;
      const g = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `hsla(${b.hue}, ${b.sat}%, ${b.lig}%, 0.9)`);
      g.addColorStop(0.5, `hsla(${b.hue}, ${b.sat}%, ${b.lig * 0.5}%, 0.4)`);
      g.addColorStop(1, `hsla(${b.hue}, ${b.sat}%, ${b.lig * 0.2}%, 0)`);
      bgCtx.fillStyle = g;
      bgCtx.fillRect(0, 0, bw, bh);
    }
    bgCtx.globalCompositeOperation = 'source-over';

    // Vignette — darker edges anchor the scene and make edge-drops feel heavier.
    const vign = bgCtx.createRadialGradient(bw * 0.5, bh * 0.5, bw * 0.3, bw * 0.5, bh * 0.5, Math.max(bw, bh) * 0.75);
    vign.addColorStop(0, 'rgba(0,0,0,0)');
    vign.addColorStop(1, 'rgba(0,0,0,0.5)');
    bgCtx.fillStyle = vign;
    bgCtx.fillRect(0, 0, bw, bh);
  }

  // ---------- Drop shape perturbation ----------
  // r(θ) = r0 * (1 + Σ aₙ·cos(kₙθ + pₙ)) for harmonics k = 3, 4, 5.
  // 3/4/5 give lumpy but convex-enough shapes (higher harmonics start
  // producing concavity which reads as "squid," not "water").
  function buildDropPath(r, sig) {
    const path = new Path2D();
    // Segment count scales with radius but capped — a 120px drop doesn't
    // need 200 segments to look smooth.
    const N = Math.min(64, Math.max(28, Math.floor(r * 0.7)));
    for (let i = 0; i <= N; i++) {
      const theta = (i / N) * Math.PI * 2;
      const perturb =
        sig.a1 * Math.cos(3 * theta + sig.p1) +
        sig.a2 * Math.cos(4 * theta + sig.p2) +
        sig.a3 * Math.cos(5 * theta + sig.p3);
      const rr = r * (1 + perturb);
      const x = Math.cos(theta) * rr;
      const y = Math.sin(theta) * rr;
      if (i === 0) path.moveTo(x, y);
      else path.lineTo(x, y);
    }
    path.closePath();
    return path;
  }

  // amplitude = total max perturbation as a fraction of radius.
  function makeShapeSig(amplitude) {
    return {
      a1: (0.5 + Math.random() * 0.5) * amplitude * 0.55,
      a2: (0.5 + Math.random() * 0.5) * amplitude * 0.30,
      a3: (0.5 + Math.random() * 0.5) * amplitude * 0.15,
      p1: Math.random() * Math.PI * 2,
      p2: Math.random() * Math.PI * 2,
      p3: Math.random() * Math.PI * 2,
      // Per-drop pinpoint specular position, in drop-local normalized coords.
      // Biased to upper half so it feels like ambient top-light.
      specX: (Math.random() - 0.5) * 0.9,
      specY: -0.30 - Math.random() * 0.45,
    };
  }

  // ---------- Drop renderer ----------
  // cx, cy: center in main-canvas CSS pixels
  // r: radius in CSS pixels
  // stretch: 0..~0.3 ellipse factor
  // stretchAngle: rotation for the stretch axis
  // sig: shape signature object from makeShapeSig
  // appear: 0..1 splat-in scale
  function drawDroplet(cx, cy, r, stretch, stretchAngle, sig, appear) {
    r *= appear;
    if (r < 0.5) return;

    // --- 1. Shadow underneath (drawn in world coords, NOT under stretch/rotate,
    //        because the shadow is on the surface below, not on the drop).
    ctx.save();
    const shR = r * 1.25;
    const shadowGrad = ctx.createRadialGradient(cx, cy + r * 0.08, r * 0.6, cx, cy + r * 0.08, shR);
    shadowGrad.addColorStop(0, 'rgba(0, 3, 10, 0.42)');
    shadowGrad.addColorStop(0.7, 'rgba(0, 3, 10, 0.15)');
    shadowGrad.addColorStop(1, 'rgba(0, 3, 10, 0)');
    ctx.fillStyle = shadowGrad;
    ctx.beginPath();
    ctx.arc(cx, cy + r * 0.08, shR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Now enter drop-local space for the drop itself.
    ctx.save();
    ctx.translate(cx, cy);
    if (stretch > 0.01) {
      ctx.rotate(stretchAngle);
      ctx.scale(1 + stretch, 1 / (1 + stretch * 0.6));
    }

    const path = buildDropPath(r, sig);

    // --- 2. Refraction. Clip to drop shape, blit background shifted.
    ctx.save();
    ctx.clip(path);

    // We want to sample the background at (cx, cy) magnified by ~1.18x,
    // with a slight offset *toward screen center* (edge drops appear to
    // warp more). Because we're in a translated+scaled local context,
    // we draw the full bg image offset by (-cx, -cy) and let the magnify
    // factor do the rest.
    const MAG = 1.18;
    // Offset the sample toward screen center. Small absolute shift.
    const ncx = cx / W - 0.5;   // -0.5..0.5
    const ncy = cy / H - 0.5;
    const offX = -ncx * r * 0.55;
    const offY = -ncy * r * 0.55;

    // Destination rect in local coords: centered on origin, scaled to MAG×W/H.
    const drawW = W * MAG;
    const drawH = H * MAG;
    // Position so the point corresponding to (cx,cy) on bg lands at origin,
    // then add offset.
    const dx = -cx * MAG + offX;
    const dy = -cy * MAG + offY;

    ctx.drawImage(bgCanvas, dx, dy, drawW, drawH);

    // --- 3. Body tint — dark toward edges, plus lower inner shadow.
    const bodyGrad = ctx.createRadialGradient(0, 0, r * 0.15, 0, 0, r);
    bodyGrad.addColorStop(0, 'rgba(5, 10, 25, 0)');
    bodyGrad.addColorStop(0.55, 'rgba(4, 8, 22, 0.18)');
    bodyGrad.addColorStop(0.85, 'rgba(2, 5, 15, 0.48)');
    bodyGrad.addColorStop(1, 'rgba(0, 1, 8, 0.72)');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-r * 1.35, -r * 1.35, r * 2.7, r * 2.7);

    // Inner lower shadow — dark pool at the bottom of the drop (dome cue).
    const innerShadow = ctx.createRadialGradient(0, r * 0.45, 0, 0, r * 0.45, r * 0.85);
    innerShadow.addColorStop(0, 'rgba(0, 2, 8, 0.32)');
    innerShadow.addColorStop(1, 'rgba(0, 2, 8, 0)');
    ctx.fillStyle = innerShadow;
    ctx.fillRect(-r * 1.35, -r * 1.35, r * 2.7, r * 2.7);

    ctx.restore(); // end clip

    // --- 4. Upper rim arc. Strokes the full drop path with a strokeStyle
    //        that's a vertical linear gradient — bright at top, fading to
    //        transparent past the equator. This gives us the curved arc
    //        shape that follows the perturbed drop outline.
    const rimGrad = ctx.createLinearGradient(0, -r, 0, r * 0.15);
    rimGrad.addColorStop(0, 'rgba(220, 235, 255, 0.88)');
    rimGrad.addColorStop(0.35, 'rgba(180, 210, 245, 0.42)');
    rimGrad.addColorStop(0.75, 'rgba(90, 120, 170, 0.06)');
    rimGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.strokeStyle = rimGrad;
    ctx.lineWidth = Math.max(1.0, r * 0.055);
    ctx.lineJoin = 'round';
    ctx.stroke(path);

    // --- 5. Pinpoint specular. Small, sharp, at the drop's own random spot.
    const pinX = sig.specX * r;
    const pinY = sig.specY * r;
    const pinR = r * 0.10;
    const pinGrad = ctx.createRadialGradient(pinX, pinY, 0, pinX, pinY, pinR);
    pinGrad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    pinGrad.addColorStop(0.5, 'rgba(240, 250, 255, 0.35)');
    pinGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = pinGrad;
    ctx.beginPath();
    ctx.arc(pinX, pinY, pinR, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ---------- Frame ----------
  function render() {
    const tSec = performance.now() / 1000;

    // 1. Regenerate background each frame (live, not cached).
    renderBackground(tSec);

    // 2. Blit bg to main canvas as the scene backdrop.
    ctx.drawImage(bgCanvas, 0, 0, W, H);

    // Don't draw drops until the game has been started at least once.
    // Before resetGame() runs, player.sig is null and targets is empty.
    if (state === STATE.READY) return;

    // 3. Draw targets with splat-in animation.
    const now = performance.now();
    for (const t of targets) {
      const age = (now - t.spawnT) / 1000;
      let appear;
      if (age < 0.22) {
        const k = age / 0.22;
        // Overshoot-and-settle
        appear = 1 + 0.35 * Math.sin(k * Math.PI) - (1 - k) * 0.6;
        appear = Math.max(0, appear);
      } else {
        appear = 1;
      }
      drawDroplet(t.x, t.y, t.r, 0, 0, t.sig, appear);
    }

    // 4. Draw player drop with velocity-based stretch.
    const speed = Math.hypot(player.vx, player.vy);
    const stretch = Math.min(TUNE.stretchMax, (speed / TUNE.stretchVelRef) * TUNE.stretchMax * 1.4);
    const stretchAngle = Math.atan2(player.vy, player.vx);
    drawDroplet(player.x, player.y, player.r, stretch, stretchAngle, player.sig, 1);
  }

  // ========================================================================
  // GAME OVER
  // ========================================================================
  const overOverlay = document.getElementById('over');
  const finalScoreEl = document.getElementById('finalScore');

  function triggerGameOver() {
    state = STATE.OVER;
    finalScoreEl.textContent = trueScore.toFixed(1);
    overOverlay.classList.remove('hidden');
  }

  // ========================================================================
  // DEBUG OVERLAY
  // ========================================================================
  const debugEl = document.getElementById('debug');
  const debugDot = document.getElementById('debugDot');
  let debugOn = false;
  debugDot.addEventListener('click', (e) => {
    e.stopPropagation();
    debugOn = !debugOn;
    debugEl.classList.toggle('on', debugOn);
    debugDot.classList.toggle('active', debugOn);
  });

  let debugLastUpdate = 0;
  function updateDebug(now) {
    if (!debugOn) return;
    if (now - debugLastUpdate < 100) return; // 10hz update — don't thrash the DOM
    debugLastUpdate = now;

    const eventsFresh = (now - lastOrientationT) < 500;
    const eventStatus = haveOrientation
      ? (eventsFresh ? '<span class="ok">LIVE</span>' : '<span class="bad">STALLED</span>')
      : '<span class="bad">NONE</span>';

    const { nx, ny } = currentTilt();
    const speed = Math.hypot(player.vx, player.vy);

    debugEl.innerHTML =
      `<span class="k">orient:</span> ${eventStatus} <span class="k">(${orientationEventCount})</span><br>` +
      `<span class="k">raw β γ:</span> ${rawBeta.toFixed(1)} ${rawGamma.toFixed(1)}<br>` +
      `<span class="k">cal β γ:</span> ${calBeta.toFixed(1)} ${calGamma.toFixed(1)}<br>` +
      `<span class="k">tilt n:</span> ${nx.toFixed(2)} ${ny.toFixed(2)}<br>` +
      `<span class="k">pos:</span> ${player.x.toFixed(0)} ${player.y.toFixed(0)}<br>` +
      `<span class="k">vel:</span> ${speed.toFixed(0)} px/s<br>` +
      `<span class="k">vol:</span> ${player.volume.toFixed(1)} µL<br>` +
      `<span class="k">state:</span> ${state}`;
  }

  // ========================================================================
  // MAIN LOOP
  // ========================================================================
  function loop(t) {
    const dtRaw = (t - lastT) / 1000;
    lastT = t;
    // Clamp dt to avoid huge jumps when tab was backgrounded
    const dt = Math.min(0.05, Math.max(0, dtRaw));
    update(dt);
    render();
    updateDebug(t);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame((t) => { lastT = t; loop(t); });

  // ========================================================================
  // UI WIRING
  // ========================================================================
  const startOverlay = document.getElementById('start');
  const startBtn = document.getElementById('startBtn');
  const replayBtn = document.getElementById('replayBtn');

  async function beginPlay() {
    const ok = await requestOrientationPermission();
    if (!ok) return;
    // Give one frame for a reading to come in, then calibrate
    setTimeout(() => {
      calBeta = rawBeta;
      calGamma = rawGamma;
      startOverlay.classList.add('hidden');
      resetGame();
      state = STATE.PLAYING;
    }, 150);
  }

  startBtn.addEventListener('click', beginPlay);
  replayBtn.addEventListener('click', () => {
    // Re-calibrate on replay too — player may be holding phone differently
    calBeta = rawBeta;
    calGamma = rawGamma;
    overOverlay.classList.add('hidden');
    resetGame();
    state = STATE.PLAYING;
  });

  // Dev fallback — desktop testing without a gyroscope (arrow keys / pointer)
  // Only active if no orientation events come in within 2 seconds of play.
  let devFallback = false;
  setTimeout(() => {
    if (!haveOrientation && state !== STATE.READY) {
      enableDevFallback();
    }
  }, 2000);
  function enableDevFallback() {
    devFallback = true;
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    // Synthesize orientation from arrow keys
    setInterval(() => {
      if (!devFallback) return;
      let gx = 0, gy = 0;
      if (keys.ArrowLeft) gx -= 25;
      if (keys.ArrowRight) gx += 25;
      if (keys.ArrowUp) gy -= 25;
      if (keys.ArrowDown) gy += 25;
      rawGamma = gx;
      rawBeta = gy;
    }, 16);
  }

  // Prevent pull-to-refresh and scroll bounce
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

})();
</script>
</body>
</html>
