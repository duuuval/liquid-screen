<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0a0f" />
<title>Liquid Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: #fff;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Background is now drawn onto the canvas (behind the drops) so we can
     sample it for the refraction effect inside each droplet. */
  html, body { background: #060811; }

  canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: block;
  }

  /* HUD — minimal, measurement-instrument feel.
     Top-right, slightly offset, low-contrast so droplets reading over it feels natural. */
  #hud {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 18px);
    right: 22px;
    z-index: 2;
    font-weight: 200;
    font-size: 28px;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  #hud .unit {
    font-size: 14px;
    font-weight: 300;
    opacity: 0.65;
    letter-spacing: 0.08em;
  }

  /* Overlays — start screen and game over screen share structure */
  .overlay {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
    background: rgba(8, 8, 16, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    text-align: center;
    transition: opacity 0.35s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title {
    font-weight: 200;
    font-size: 38px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
  }
  .title .accent {
    color: #7ec9ff;
    font-weight: 300;
  }
  .subtitle {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    max-width: 280px;
    line-height: 1.7;
  }

  .btn {
    font-family: inherit;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 16px 32px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.7);
    transform: scale(0.98);
  }

  /* Debug overlay — tap the dot in the bottom-left to toggle */
  #debugDot {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    left: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    z-index: 3;
    cursor: pointer;
  }
  #debugDot.active { background: rgba(126, 201, 255, 0.6); border-color: #7ec9ff; }
  #debug {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 50px);
    left: 12px;
    z-index: 3;
    font-size: 10px;
    line-height: 1.5;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.55);
    padding: 10px 12px;
    border-radius: 4px;
    pointer-events: none;
    letter-spacing: 0.02em;
    max-width: 200px;
    font-variant-numeric: tabular-nums;
    display: none;
  }
  #debug.on { display: block; }
  #debug .k { color: rgba(255,255,255,0.45); }
  #debug .ok { color: #8fe28f; }
  #debug .bad { color: #ff9488; }

  .final-score {
    font-weight: 200;
    font-size: 64px;
    letter-spacing: 0.02em;
    color: #7ec9ff;
    font-variant-numeric: tabular-nums;
  }
  .final-score .unit {
    font-size: 22px;
    opacity: 0.6;
    margin-left: 6px;
  }
  .label {
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .err {
    color: #ff9488;
    font-size: 12px;
    letter-spacing: 0.1em;
    max-width: 280px;
    line-height: 1.6;
    margin-top: -12px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud"><span id="score">50.0</span><span class="unit">µL</span></div>

<!-- Debug overlay (tap dot to toggle) -->
<div id="debugDot"></div>
<div id="debug"></div>

<!-- Start / calibrate screen -->
<div id="start" class="overlay">
  <div class="title">Liquid<span class="accent"> Screen</span></div>
  <div class="subtitle">Tilt your phone to roll the droplet.<br>Absorb others to grow.<br>Don't slide off.</div>
  <button id="startBtn" class="btn">Tap to Calibrate</button>
  <div id="err" class="err" style="display:none"></div>
</div>

<!-- Game over screen -->
<div id="over" class="overlay hidden">
  <div class="label">Final Volume</div>
  <div class="final-score"><span id="finalScore">50.0</span><span class="unit">µL</span></div>
  <button id="replayBtn" class="btn">Replay</button>
</div>

<script>
(() => {
  'use strict';

  // ========================================================================
  // SETUP & CONSTANTS
  // ========================================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: true });

  const DPR = Math.min(window.devicePixelRatio || 1, 2); // cap at 2 for perf on high-dpi phones
  let W = 0, H = 0;  // CSS pixels (logical)

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ---- Tunables (gameplay feel lives here — all the knobs in one place)
  const TUNE = {
    // Physics
    baseAccel: 1200,         // px/s^2 at full tilt, at starting mass
    massAccelExp: 0.45,      // how much bigger = slower to accelerate. 0 = no effect, 1 = linear. 0.45 feels "heavy but not stuck"
    friction: 0.985,         // per-frame velocity multiplier at 60fps (tiny amount of drag so full-release slows eventually)
    tiltMaxDeg: 35,          // beyond this tilt, you're already at max accel — don't require wrist-breaking angles
    tiltDeadzone: 1.5,       // degrees — ignore tiny jitter when phone is "flat"
    // Starting state
    startVolume: 50.0,       // µL
    minVolume: 5,            // target drop min volume
    maxVolume: 15,           // target drop max volume
    targetCount: 10,         // on-screen static drops
    // Visuals
    radiusPerUL: 1.25,       // px per µL — r = radiusPerUL * cbrt(volume) * tuningConstant — actually, we use area scaling (see deriveRadius)
    stretchMax: 0.28,        // max ellipse stretch factor at high speed (0.28 = 28% elongation)
    stretchVelRef: 900,      // velocity (px/s) at which stretch approaches max
    // Wobble (jiggle on braking / direction change)
    wobSpring: 55,           // spring stiffness — higher = snappier return
    wobDamp: 6,              // damping — higher = less oscillation, more dead
    wobImpulseScale: 0.012,  // how much velocity change feeds into wobble velocity
    wobMaxAmp: 0.35,         // clamp — prevents visual explosion on huge impulses
    // Edge suction — pulls the drop toward nearest edge, intensifies with size.
    // Models the real-world fact that big drops on tilted glass run off faster
    // because gravity has more mass to act on and less surface-tension ratio.
    // Force curve: F = suctionStrength * (massFactor) * (proximity^2)
    //   - proximity = 1 - (edge_distance / suctionReach). Beyond suctionReach
    //     from any edge, proximity = 0 (no force).
    //   - massFactor = (volume / startVolume)^suctionMassExp
    //   - Quadratic in proximity so it ramps hard near the edge.
    suctionReach: 180,       // px from edge where suction begins (at start size).
                             // Scales up with drop radius so bigger drops feel it earlier.
    suctionReachPerR: 1.4,   // reach grows with radius: effectiveReach = suctionReach + r * this
    suctionStrength: 900,    // px/s^2 max acceleration at edge and high mass
    suctionMassExp: 1.1,     // how hard mass amplifies suction. 1.0 = linear, 1.5 = punishing
    // Score animation
    scoreLerpHz: 6,          // how fast the displayed score chases true score (higher = faster)
  };

  // Physical radius from volume. Treating the droplet top-down as a circle,
  // volume µL ~ proportional to area (rough but reads correctly on screen).
  // r = k * sqrt(volume). Tuned so 50µL -> ~38px radius, 200µL -> ~76px.
  function deriveRadius(volume) {
    return 5.4 * Math.sqrt(volume);
  }

  // ========================================================================
  // STATE
  // ========================================================================
  const STATE = {
    READY: 'ready',     // showing calibrate screen
    PLAYING: 'playing',
    OVER: 'over',
  };
  let state = STATE.READY;

  // Orientation — raw from device
  let rawBeta = 0;    // front-back tilt (x axis)  -180..180
  let rawGamma = 0;   // left-right tilt (y axis)  -90..90
  let haveOrientation = false;
  let orientationEventCount = 0;   // for debug
  let lastOrientationT = 0;        // for debug — detect stalled events

  // Calibrated zero — set on tap
  let calBeta = 0;
  let calGamma = 0;

  // Shape-noise amplitudes (fraction of radius).
  const PLAYER_SHAPE_AMP = 0.09;   // ~9% perturbation — lumpy but still clearly "me"
  const TARGET_SHAPE_AMP = 0.14;   // ~14% — more varied, reads as real beads

  // Player droplet
  const player = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    // Wobble: a spring-damped velocity-lag vector. When the player's actual
    // velocity changes suddenly (braking, turning), this lags behind, and
    // the difference drives shape oscillation. See update() for physics.
    wobX: 0, wobY: 0,          // current wobble offset (oscillates)
    wobVX: 0, wobVY: 0,        // wobble velocity (spring integration)
    lastVX: 0, lastVY: 0,      // velocity from previous frame — for impulse detection
    volume: TUNE.startVolume,
    r: deriveRadius(TUNE.startVolume),
    sig: null,   // populated below once makeShapeSig is defined — see init
  };

  // Static target drops
  const targets = []; // { x, y, volume, r, spawnT, sig }

  // Score
  let displayedScore = TUNE.startVolume;  // what's shown, chases trueScore
  let trueScore = TUNE.startVolume;

  // Time
  let lastT = performance.now();

  // ========================================================================
  // SPAWNING
  // ========================================================================
  function randomTargetVolume() {
    return TUNE.minVolume + Math.random() * (TUNE.maxVolume - TUNE.minVolume);
  }

  function spawnTarget(avoidPlayer = true) {
    const margin = 40;
    let x, y, tries = 0;
    const vol = randomTargetVolume();
    const r = deriveRadius(vol);
    do {
      x = margin + Math.random() * (W - 2 * margin);
      y = margin + Math.random() * (H - 2 * margin);
      tries++;
      if (tries > 20) break;
    } while (
      avoidPlayer &&
      Math.hypot(x - player.x, y - player.y) < player.r + r + 60
    );
    targets.push({
      x, y, volume: vol, r,
      spawnT: performance.now(),       // for splat-in animation
      sig: makeShapeSig(TARGET_SHAPE_AMP),
    });
  }

  function resetGame() {
    player.x = W / 2;
    player.y = H / 2;
    player.vx = 0;
    player.vy = 0;
    player.lastVX = 0;
    player.lastVY = 0;
    player.wobX = 0;
    player.wobY = 0;
    player.wobVX = 0;
    player.wobVY = 0;
    player.volume = TUNE.startVolume;
    player.r = deriveRadius(player.volume);
    player.sig = makeShapeSig(PLAYER_SHAPE_AMP);
    targets.length = 0;
    trueScore = TUNE.startVolume;
    displayedScore = TUNE.startVolume;
    updateScoreHUD(true);
    for (let i = 0; i < TUNE.targetCount; i++) spawnTarget(true);
  }

  // ========================================================================
  // ORIENTATION / PERMISSIONS
  // ========================================================================
  function onOrientation(e) {
    if (e.beta == null || e.gamma == null) return;
    rawBeta = e.beta;
    rawGamma = e.gamma;
    haveOrientation = true;
    orientationEventCount++;
    lastOrientationT = performance.now();
  }

  async function requestOrientationPermission() {
    // iOS 13+ requires explicit permission via user gesture
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res !== 'granted') {
          showErr('Motion access denied. Enable in Settings → Safari → Motion & Orientation.');
          return false;
        }
      } catch (err) {
        showErr('Could not request motion access. Try reloading.');
        return false;
      }
    }
    window.addEventListener('deviceorientation', onOrientation, true);
    return true;
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ========================================================================
  // INPUT → ACCEL
  // ========================================================================
  function currentTilt() {
    // gamma = left-right (controls X), beta = front-back (controls Y)
    let gx = rawGamma - calGamma;
    let gy = rawBeta - calBeta;

    // deadzone
    if (Math.abs(gx) < TUNE.tiltDeadzone) gx = 0;
    if (Math.abs(gy) < TUNE.tiltDeadzone) gy = 0;

    // clamp to tiltMaxDeg so everything past that is just "max tilt"
    const max = TUNE.tiltMaxDeg;
    gx = Math.max(-max, Math.min(max, gx));
    gy = Math.max(-max, Math.min(max, gy));

    // normalize to -1..1
    return { nx: gx / max, ny: gy / max };
  }

  // ========================================================================
  // UPDATE
  // ========================================================================
  function update(dt) {
    if (state !== STATE.PLAYING) return;

    const { nx, ny } = currentTilt();

    // Mass-scaled acceleration. Bigger droplets accelerate slower.
    const massRatio = player.volume / TUNE.startVolume;
    const accelScale = Math.pow(massRatio, -TUNE.massAccelExp);
    const ax = nx * TUNE.baseAccel * accelScale;
    const ay = ny * TUNE.baseAccel * accelScale;

    player.vx += ax * dt;
    player.vy += ay * dt;

    // Edge suction — gravitational pull toward the nearest screen edge,
    // intensifying with drop size. Applied as acceleration AFTER tilt accel
    // so the player can still fight it by tilting the other way (but only
    // up to a point, if they've grown big enough).
    //
    // For each edge, compute how close the drop is (accounting for its
    // radius — we measure from the drop's leading edge toward the screen
    // edge, not from its center). Combine all four edge pulls into a
    // single force vector.
    {
      const massFactor = Math.pow(massRatio, TUNE.suctionMassExp);
      const reach = TUNE.suctionReach + player.r * TUNE.suctionReachPerR;
      let sfx = 0, sfy = 0;

      // Distance from each edge, measured from the closest point on the drop.
      const dLeft   = player.x - player.r;              // how far the left edge of the drop is from x=0
      const dRight  = W - (player.x + player.r);        // from right edge
      const dTop    = player.y - player.r;
      const dBottom = H - (player.y + player.r);

      // For each edge: if within reach, add a force pulling the drop that way.
      // proximity = 1 at the edge, 0 at reach distance, clamped.
      // Force = strength * massFactor * proximity^2
      if (dLeft < reach) {
        const prox = 1 - Math.max(0, dLeft) / reach;
        sfx -= TUNE.suctionStrength * massFactor * prox * prox;
      }
      if (dRight < reach) {
        const prox = 1 - Math.max(0, dRight) / reach;
        sfx += TUNE.suctionStrength * massFactor * prox * prox;
      }
      if (dTop < reach) {
        const prox = 1 - Math.max(0, dTop) / reach;
        sfy -= TUNE.suctionStrength * massFactor * prox * prox;
      }
      if (dBottom < reach) {
        const prox = 1 - Math.max(0, dBottom) / reach;
        sfy += TUNE.suctionStrength * massFactor * prox * prox;
      }

      player.vx += sfx * dt;
      player.vy += sfy * dt;

      // Stash for debug overlay
      player._suctionX = sfx;
      player._suctionY = sfy;
    }

    // Friction (frame-rate independent approximation)
    const fricFactor = Math.pow(TUNE.friction, dt * 60);
    player.vx *= fricFactor;
    player.vy *= fricFactor;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Wobble physics. Model: a damped spring-mass where the "mass" is the
    // wobble offset vector and the impulse comes from sudden velocity
    // changes (braking, turning). The spring pulls it back to zero.
    //
    // Detect velocity delta this frame (as acceleration, not spring force —
    // we want the drop's water to visually "slosh" in the opposite direction
    // of deceleration, like liquid in a moving glass).
    const dvx = player.vx - player.lastVX;
    const dvy = player.vy - player.lastVY;
    // Impulse is opposite to velocity change (conservation of momentum feel)
    player.wobVX -= dvx * TUNE.wobImpulseScale * 60;  // *60 normalizes to per-second-ish
    player.wobVY -= dvy * TUNE.wobImpulseScale * 60;

    // Spring integration (semi-implicit Euler)
    const springFx = -TUNE.wobSpring * player.wobX - TUNE.wobDamp * player.wobVX;
    const springFy = -TUNE.wobSpring * player.wobY - TUNE.wobDamp * player.wobVY;
    player.wobVX += springFx * dt;
    player.wobVY += springFy * dt;
    player.wobX += player.wobVX * dt;
    player.wobY += player.wobVY * dt;

    // Clamp wobble magnitude so huge impulses don't cause visual glitches
    const wMag = Math.hypot(player.wobX, player.wobY);
    if (wMag > TUNE.wobMaxAmp) {
      player.wobX = (player.wobX / wMag) * TUNE.wobMaxAmp;
      player.wobY = (player.wobY / wMag) * TUNE.wobMaxAmp;
    }

    player.lastVX = player.vx;
    player.lastVY = player.vy;

    // Game over — entire drop off screen (soccer-line rule)
    if (player.x + player.r < 0 ||
        player.x - player.r > W ||
        player.y + player.r < 0 ||
        player.y - player.r > H) {
      triggerGameOver();
      return;
    }

    // Collisions with targets
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      const dx = t.x - player.x;
      const dy = t.y - player.y;
      const d = Math.hypot(dx, dy);
      // Absorb when the player's leading edge overlaps the target center-ish.
      // Using r + r*0.5 feels like "the target gets sucked in" rather than merely grazed.
      if (d < p
